name: Deploy Dev

on:
  push:
    branches: [develop]
    paths:
      - 'app/**'
      - 'docker/**'
      - 'terraform-modules/**'
      - 'terragrunt/dev/**'
      - '.github/workflows/deploy-dev.yml'

  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: enterprise-deployment-platform-dev-app

jobs:

  fmt-validate-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform-modules/

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive --chdir=terraform-modules

      - name: Setup Terragrunt
        run: |
          curl -sL -f https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o /tmp/terragrunt-bin
          chmod +x /tmp/terragrunt-bin
          sudo mv /tmp/terragrunt-bin /usr/local/bin/terragrunt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt validate (dev)
        run: terragrunt run --all -- validate
        working-directory: terragrunt/dev
  # ---------------------------------------------------------------------
  # Build, scan, push image - runs on every push to develop that touches
  # app/docker code. This is safe to automate: ECR storage is cheap and
  # scan-on-push catches vulnerabilities before anything gets deployed.
  # ---------------------------------------------------------------------
  build-and-scan:
    runs-on: ubuntu-latest
    needs: fmt-validate-lint
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag from commit SHA
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build --provenance=false \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }} \
            -f docker/Dockerfile .

      # Trivy scan BEFORE pushing - catches vulnerabilities early, same
      # class of issue we found manually in Phase 4 (OpenSSL CVE). Fails
      # the pipeline on HIGH or CRITICAL findings.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push image to ECR
        if: success()
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}

  # ---------------------------------------------------------------------
  # Terragrunt plan - runs automatically after a successful build+scan.
  # Read-only, no cost, safe to automate.
  # ---------------------------------------------------------------------
  terragrunt-plan:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Setup Terragrunt
        run: |
          curl -sL -f https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o /tmp/terragrunt-bin
          chmod +x /tmp/terragrunt-bin
          sudo mv /tmp/terragrunt-bin /usr/local/bin/terragrunt

      - name: Terragrunt plan (networking)
        run: terragrunt plan
        working-directory: terragrunt/dev/networking
        continue-on-error: true # networking may already be applied/unapplied - informational only

      - name: Terragrunt plan (ecs-service)
        run: terragrunt plan
        working-directory: terragrunt/dev/ecs-service
        continue-on-error: true

  # ---------------------------------------------------------------------
  # Apply / Destroy - MANUAL TRIGGER ONLY (workflow_dispatch). This stack
  # bills real money (NAT Gateway + RDS + ALB + Fargate), so we never
  # auto-apply on every push. A human explicitly chooses when to deploy
  # or tear down Dev infrastructure.
  # ---------------------------------------------------------------------
  terragrunt-apply-or-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan'
    environment: dev-manual-approval
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Setup Terragrunt
        run: |
          curl -sL -f https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o /tmp/terragrunt-bin
          chmod +x /tmp/terragrunt-bin
          sudo mv /tmp/terragrunt-bin /usr/local/bin/terragrunt

      - name: Apply networking -> iam -> ecr -> database -> ecs-service
        if: github.event.inputs.action == 'apply'
        run: |
          for module in networking iam ecr database ecs-service; do
            echo "Applying $module..."
            (cd terragrunt/dev/$module && terragrunt apply -auto-approve)
          done

      - name: Destroy ecs-service -> database -> networking (reverse order)
        if: github.event.inputs.action == 'destroy'
        run: |
          for module in ecs-service database networking; do
            echo "Destroying $module..."
            (cd terragrunt/dev/$module && terragrunt destroy -auto-approve)
          done
